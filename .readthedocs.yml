version: "2"

build:
  os: "ubuntu-24.04"
  tools:
    python: "3.13"

  jobs:
    install:
      - pip install uv
      - uv sync --group docs --no-default-groups
    build:
      html:
        - uv run --group docs --module mkdocs build --clean --site-dir "$READTHEDOCS_OUTPUT/html" --config-file mkdocs.yml
