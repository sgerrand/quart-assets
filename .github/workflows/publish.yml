name: Publish Python package

on:
  release:
    types: [ published ]

permissions: {}

env:
  PYTHON_VERSION: "3.13"

jobs:
  build-sdist:
    name: Build sdist

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: main

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true

      - name: Build PyPI package
        run: uv build --sdist

      - name: Upload artefacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: artefacts-sdist
          path: ./dist/quart_assets-*.tar.gz

  build-wheels:
    name: Build wheels on ${{ matrix.os }}

    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm, windows-2025, windows-11-arm, macos-15]

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: main

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true

      - name: Build PyPI package
        run: uv build --wheel

      - name: Upload artefacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: artefacts-wheel-${{ matrix.os }}
          path: ./dist/quart_assets-*.whl

  publish-test-pypi:
    name: Publish TestPyPI package

    needs:
      - build-sdist
      - build-wheels

    runs-on: ubuntu-latest

    env:
      PUBLISH_REGISTRY: https://test.pypi.org/legacy/

    environment:
      name: testpypi
      url: https://test.pypi.org/p/quart-assets

    permissions:
      contents: read
      # IMPORTANT: this permission is mandatory for Trusted Publishing
      id-token: write

    steps:
      - name: Download artefacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: artefacts-*
          path: dist
          merge-multiple: true

      - name: Publish PyPI package
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          repository-url: ${{ env.PUBLISH_REGISTRY }}

  publish-pypi:
    name: Publish PyPI package

    needs:
      - build-sdist
      - build-wheels

    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/p/quart-assets

    permissions:
      contents: read
      # IMPORTANT: this permission is mandatory for Trusted Publishing
      id-token: write

    steps:
      - name: Download artefacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: artefacts-*
          path: dist
          merge-multiple: true

      - name: Publish PyPI package
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
